local L4 = require("L4");

local loader = L4.default_loader;
local cmd = loader:new_channel();
local io_buses = {
  gui = loader:new_channel(),
  fbdrv = loader:new_channel(),
};

loader:start({
  caps = {
    icu = L4.Env.icu,
    sigma0 = L4.Env.sigma0,
    gui = io_buses.gui:svr(),
    fbdrv = io_buses.fbdrv:svr(),
  },
  log = { "IO", "yellow" },
}, "rom/io rom/x86-legacy.devs rom/x86-fb.io");

local fb = L4.Env.vesa;
if not fb then
  print("mosaicos-graphical-recovery: no L4.Env.vesa framebuffer capability available");
end

loader:start({
  log = { "mosaic-init", "cyan" },
  caps = { svr = cmd, fb = fb },
}, "rom/mosaic-init rom/mosaic-graphical-recovery.manifest");

L4.server_loop(cmd);
