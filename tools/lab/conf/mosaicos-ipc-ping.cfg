local L4 = require("L4");
local loader = L4.default_loader;
local ping = loader:new_channel();

loader:start(
  {
    log = { "ping-receiver", "green" },
    caps = { ping_server = ping:svr() },
  },
  "rom/ping-receiver");

loader:start(
  {
    log = { "ping-sender", "cyan" },
    caps = { ping_server = ping:m("rw") },
  },
  "rom/ping-sender");
